<mat-card class="chat-container">
  <div>
    <mat-toolbar>
      <span>Simple Chat</span>
    </mat-toolbar>
  </div>
  <div class="chat-history" #chatHistory>
    <div class="messages">
      @for(msg of messages(); track msg) {
        <div class="message">
          <div class="message-bubble" [ngClass]="{'user': !msg.isBot, 'error': msg.isError}">
            {{ msg.text }}
          </div>
        </div>
      }
      @if (isLoading) {
        <div class="message">
          <div class="message-bubble">
            <span class="typing">......</span>
          </div>
        </div>
      }
    </div>
  </div>

  <div class="chat-input">
    <mat-form-field class="full-width">
      <mat-label>Ask anything</mat-label>
      <input matInput [(ngModel)]="userPrompt" (keyup.enter)="sendMessage()">
      <button type="button" matSuffix matIconButton aria-label="Send" (click)="sendMessage()" [disabled]="!userPrompt() || isLoading">
        <mat-icon>send</mat-icon>
      </button>
    </mat-form-field>
  </div>
</mat-card>
